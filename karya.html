<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Nilai Siswa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .status-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ringkasan Nilai Akademik</h2>
    <p>Nama Siswa: <strong>Bayu Setiawan</strong></p>
    
    <table>
        <thead>
            <tr>
                <th>Mata Pelajaran</th>
                <th>Nilai KKM</th>
                <th>Nilai Akhir</th>
                <th>Keterangan</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pemrograman Web (PHP & SQL)</td>
                <td>75</td>
                <td>88</td>
                <td style="color: green; font-weight: bold;">Tuntas</td>
            </tr>
            <tr>
                <td>Basis Data</td>
                <td>75</td>
                <td>85</td>
                <td style="color: green; font-weight: bold;">Tuntas</td>
            </tr>
            <tr>
                <td>Sejarah Indonesia</td>
                <td>75</td>
                <td>80</td>
                <td style="color: green; font-weight: bold;">Tuntas</td>
            </tr>
        </tbody>
    </table>

    <div class="status-box">
        STATUS KELULUSAN: MEMENUHI SYARAT KELULUSAN (LULUS)
    </div>
</div>

</body>
</html>
